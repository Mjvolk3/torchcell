name: Lint (ruff)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.head.label || github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.13"

      - name: Install ruff
        run: |
          python -m pip install --upgrade pip
          pip install -r env/requirements_style.txt

      # Advisory + diff-scoped: enforcement lands on changed source while the
      # repo-wide ruff backlog (the deferred --fix/format sweep) is paid down
      # separately. continue-on-error keeps the build green during the transition.
      - name: Ruff check + format-check (changed files; advisory)
        continue-on-error: true
        run: |
          git fetch origin main --depth=1 || true
          FILES=$(git diff --name-only origin/main...HEAD -- 'torchcell/**/*.py' 'tests/torchcell/**/*.py')
          if [ -n "$FILES" ]; then
            echo "Changed Python files:"; echo "$FILES"
            ruff check $FILES
            ruff format --check $FILES
          else
            echo "No changed torchcell/tests Python files vs origin/main."
          fi
