name: Semantic Release

on:
  push:
    branches:
      - main  # Change this to 'master' if your main branch is named 'master'

jobs:
  release:
    runs-on: ubuntu-latest
    concurrency: release
    permissions:
      id-token: write
      contents: write

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
        # PAT (admin-owned) so the version-bump push bypasses branch protection;
        # GITHUB_TOKEN / github-actions[bot] cannot bypass required status checks.
        token: ${{ secrets.TORCHCELL_SEMANTIC_RELEASE_TOKEN }}

    - name: Python Semantic Release
      uses: python-semantic-release/python-semantic-release@master
      with:
        github_token: ${{ secrets.TORCHCELL_SEMANTIC_RELEASE_TOKEN }}
