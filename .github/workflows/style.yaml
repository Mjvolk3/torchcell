name: Lint (ruff)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.head.label || github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.13"

      - name: Install ruff
        run: |
          python -m pip install --upgrade pip
          pip install -r env/requirements_style.txt

      # Blocking + whole-tree (WS4): the repo-wide ruff backlog is zero (WS1), so
      # the gate enforces ruff lint + format on the entire torchcell/ + tests/ tree.
      - name: Ruff check + format-check (whole tree; blocking)
        run: |
          ruff check torchcell tests
          ruff format --check torchcell tests

      # WS5: NEW experiments (numbered >= 016) are held to ruff + format; everything
      # <= 015, DEPRECATED_*, and non-numbered utility dirs stay frozen for
      # reproducibility (Decision 5). The numeric threshold auto-includes future
      # experiments by their id; empty today (latest is 015) so this step is a no-op.
      # Strict mypy / pytest on an experiment remains opt-in per experiment.
      - name: Ruff on gated experiments (numbered >= 016; blocking)
        run: |
          GATED=""
          for d in experiments/*/; do
            name=$(basename "$d")
            num=${name%%-*}
            case "$num" in ""|*[!0-9]*) continue;; esac
            [ "$((10#$num))" -ge 16 ] && GATED="$GATED $d"
          done
          if [ -n "$GATED" ]; then
            echo "Gated experiments (>=016):$GATED"
            ruff check $GATED
            ruff format --check $GATED
          else
            echo "No gated (>=016) experiments yet -- nothing to lint."
          fi
