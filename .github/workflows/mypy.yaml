name: Type check (mypy)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.head.label || github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  mypy-check:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.13"

    - name: Install base dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r env/requirements.txt

    - name: Install mypy dependencies
      run: |
        pip install -r env/requirements_mypy.txt

    - name: Install torchcell package
      run: |
        pip install -e .

    # Blocking + diff-scoped (WS4): strict mypy on the CHANGED torchcell files only,
    # with --follow-imports=silent so findings are scoped to those files. Whole-tree
    # mypy is not reproducible in CI without pinning the full dependency env (CI's
    # installed packages differ from the dev conda env, and mypy's findings depend on
    # them); diff-scoping keeps the gate robust and meaningful (new code is held to
    # strict, authors verify locally) without that lock. See WS4 notes.
    - name: Mypy strict (changed torchcell files; blocking)
      run: |
        git fetch origin main --depth=1 || true
        # Exclude torchcell/experiments/: passing explicit files to mypy BYPASSES the
        # pyproject [tool.mypy] exclude regex (exclude only filters path-discovery, not
        # an explicit file list), so experiments must be filtered out here, in the
        # file-selection step, to honor Decision 5 (experiments out of the gate).
        FILES=$(git diff --name-only origin/main...HEAD -- 'torchcell/**/*.py' ':(exclude)torchcell/experiments/**')
        if [ -n "$FILES" ]; then
          echo "Changed torchcell files:"; echo "$FILES"
          mypy $FILES --config-file=pyproject.toml --follow-imports=silent
        else
          echo "No changed torchcell Python files vs origin/main."
        fi
