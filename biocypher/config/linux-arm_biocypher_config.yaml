
biocypher:
  offline: true
  debug: false
  cache_directory: .cache

neo4j:
  delimiter: '\t'
  array_delimiter: '|'
  skip_duplicate_nodes: true
  skip_bad_relationships: true

  import_call_bin_prefix: /var/lib/neo4j/bin/
  # import_call_file_prefix omitted on purpose: stock biocypher uses the absolute
  # output_directory (.../biocypher-out/<timestamp>) verbatim, which resolves for
  # neo4j-admin inside the container. (The retired fork auto-joined relpath(outdir,cwd).)
  
  # Wipe DB before import (offline mode: --force)
  wipe: true
  # TODO set to false for community version or old neo4j
  # multi_db: true

  database_name: torchcell
  uri: neo4j://localhost:7687
  user: neo4j
  password: torchcell
