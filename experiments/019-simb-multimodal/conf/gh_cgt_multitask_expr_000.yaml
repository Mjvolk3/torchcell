# experiments/019-simb-multimodal/conf/gh_cgt_multitask_expr_000.yaml
# GilaHyper full-run: EXPRESSION-ONLY baseline (per_gene head) on the Fig-3 build.
# Real model size, 4-GPU DDP. Trains the per_gene expression head (Kemmeren/Sameith
# microarray log2-ratios) on the ~1484 expression genotypes; MaskedMultitaskLoss
# restricts supervision to expression-carrying rows. Metric: epoch per-feature Pearson
# averaged over the 6127 measured genes, in raw log2-ratio units (Part B).
defaults:
  - default
  - _self_

dry_run: false

wandb:
  project: torchcell_019-simb-multimodal_cgt_multitask
  tags: [ws-run, gilahyper, expr, baseline]

cell_dataset:
  graphs: [physical, regulatory]
  node_embeddings: []
  query_file: fig3_core.cql
  dataset_tag: fig3_core

# Expression targets (log2-ratios) are not renormalized; gene_interaction transform
# is inactive since the scalar head is off here.
transforms:
  use_transforms: false

data_module:
  is_perturbation_subset: false
  perturbation_subset_size: 10000
  batch_size: 32
  num_workers: 14
  pin_memory: true
  prefetch: false

trainer:
  max_epochs: 600
  strategy: ddp
  accelerator: gpu
  devices: 4
  overfit_batches: 0
  precision: bf16-mixed
  log_every_n_steps: 10
  fast_dev_run: false

multitask:
  active_heads: [per_gene]
  loss_fn: mse
  normalize_vector_targets: []
  vector_norm_method: yeo_johnson
  target_norm_eps: 1.0e-8
  drop_features: {}
  degenerate_robust_cv: 0.01
  heads:
    global:
      output_dim: 278
      use_gene_pool: true
    per_gene:
      output_dim: 1
    per_metabolite:
      output_dim: 1
  head_weights:
    gene_interaction: 1.0
    per_gene: 1.0
    global: 1.0
    per_metabolite: 1.0
  head_phenotypes:
    gene_interaction: [fitness, gene_interaction]
    per_gene: [expression_log2_ratio]
    global: [calmorph]
    per_metabolite: [metabolite]

model:
  checkpoint_path: null
  gene_num: 6607
  hidden_channels: 180
  num_transformer_layers: 8
  num_attention_heads: 9
  dropout: 0.1
  learnable_embedding:
    enabled: true
    size: ${model.hidden_channels}
    preprocessor:
      num_layers: 2
      dropout: 0.1
  graph_regularization:
    graph_reg_lambda: 0.001
    graph_reg_layer: [1, 2, 3, 4]
    row_sampling_rate: 1.0
    regularized_heads:
      physical:
        layer: ${model.graph_regularization.graph_reg_layer}
        head: 0
        lambda: ${model.graph_regularization.graph_reg_lambda}
      regulatory:
        layer: ${model.graph_regularization.graph_reg_layer}
        head: 1
        lambda: ${model.graph_regularization.graph_reg_lambda}
  perturbation_head:
    num_heads: 9
    dropout: 0.1

regression_task:
  optimizer:
    type: AdamW
    lr: 1e-4
    weight_decay: 1e-8
  lr_scheduler:
    type: CosineAnnealingWarmupRestarts
    first_cycle_steps: 40
    cycle_mult: 1.0
    max_lr: 5e-4
    min_lr: 1e-7
    warmup_steps: 1
    gamma: 0.70
  clip_grad_norm: true
  clip_grad_norm_max_norm: 10.0
