name: Type check (mypy)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.head.label || github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  mypy-check:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.13"

    - name: Install base dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r env/requirements.txt

    - name: Install mypy dependencies
      run: |
        pip install -r env/requirements_mypy.txt

    - name: Install torchcell package
      run: |
        pip install -e .

    # Advisory + diff-scoped: strict mypy runs on changed source so new code is
    # held to it, while the 7,601-error backlog is cleaned up separately.
    # continue-on-error keeps the build green during the transition.
    - name: Mypy strict (changed torchcell files; advisory)
      continue-on-error: true
      run: |
        git fetch origin main --depth=1 || true
        FILES=$(git diff --name-only origin/main...HEAD -- 'torchcell/**/*.py')
        if [ -n "$FILES" ]; then
          echo "Changed torchcell files:"; echo "$FILES"
          mypy $FILES --config-file=pyproject.toml
        else
          echo "No changed torchcell Python files vs origin/main."
        fi
