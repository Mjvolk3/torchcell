name: Pytest with Coverage

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.head.label || github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  pytest-coverage:
    runs-on: ubuntu-latest
    # Advisory (WS4 decouple): the full suite is not yet CI-hardened -- several tests
    # assume ambient DATA_ROOT / /scratch data, a wall-clock micro-benchmark, and
    # filelock-version-specific behavior. Keep pytest RUNNING for visibility but
    # NON-BLOCKING until a focused follow-up makes those CI-portable; ruff + mypy are
    # blocking. Remove continue-on-error to flip pytest blocking once the suite is green.
    continue-on-error: true

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.13"

    # Cache the dependencies
    - name: Cache pip dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('env/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install base dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r env/requirements.txt

    - name: Install base-dependent dependencies
      run: |
        # torch-scatter compiles a C++ extension and imports torch at BUILD time;
        # pip's build isolation hides the torch installed above, so the build fails
        # with "No module named 'torch'". Install the build backend and build
        # against the already-installed torch with --no-build-isolation.
        pip install setuptools wheel ninja
        pip install --no-build-isolation -r env/requirements_dependent.txt

    - name: Install test dependencies
      run: |
        pip install -r env/requirements_test.txt

    - name: Install torchcell package
      run: |
        pip install -e .

    # Blocking (WS4): the WS3 test backlog is cleared. GPU tests are deselected
    # (no CUDA on the runner); the DATA_ROOT / /scratch-dependent files self-skip
    # via in-test guards when their data is absent, so they no longer need --ignore.
    - name: Run pytest with coverage (blocking)
      run: |
        coverage run -m pytest tests/torchcell -m "not gpu"
        coverage report
        coverage xml

    - name: Upload coverage reports to Codecov
      uses: codecov/codecov-action@v4
      env:
        CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
