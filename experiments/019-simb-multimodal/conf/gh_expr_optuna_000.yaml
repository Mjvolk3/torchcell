# experiments/019-simb-multimodal/conf/gh_expr_optuna_000.yaml
# GilaHyper EXPRESSION Optuna sweep (per_gene head, FULL Kemmeren expression — NOT the 1,440
# both-cell control). Drives optuna_joint_sweep.py with CONDITION=expr. Fixes the objective bug:
# monitors + returns the PEAK val/per_gene/pearson_per_gene (runs peak ~0.13 then collapse).
# GilaHyper = plain python + W&B ONLINE. Single-GPU per trial (4 workers pinned per GPU).
defaults:
  - default
  - _self_

dry_run: false
seed: 0

wandb:
  project: torchcell_019_expr
  tags: [ws-run, gilahyper, expr, optuna, peak]

cell_dataset:
  graphs: [physical, regulatory]
  node_embeddings: []
  query_file: fig3_core.cql
  dataset_tag: fig3_core
  # Full Kemmeren expression (the clean arm; no cross-platform mean-merge). NO require_modalities.
  restrict_dataset_names: [MicroarrayKemmeren2014Dataset]

transforms:
  use_transforms: false

data_module:
  is_perturbation_subset: false
  perturbation_subset_size: 10000
  batch_size: 32
  num_workers: 4
  pin_memory: true
  prefetch: false

trainer:
  max_epochs: 80        # runs peak early; 80 caps trial time for the 6h budget
  strategy: auto
  accelerator: gpu
  devices: 1
  overfit_batches: 0
  precision: bf16-mixed
  log_every_n_steps: 10
  fast_dev_run: false
  # Early-stop on the HONEST metric (peak), NOT val/loss — stops near the peak so trials are
  # fast and the deployed checkpoint is the peak, not the collapsed tail.
  early_stopping:
    enabled: true
    monitor: val/per_gene/pearson_per_gene
    mode: max
    patience: 15
    min_delta: 0.0

multitask:
  active_heads: [per_gene]     # driver re-asserts this for CONDITION=expr
  loss_fn: mse
  normalize_vector_targets: []
  standardize_per_feature_target: []   # driver sweeps raw vs zscore(per_gene)
  vector_norm_method: yeo_johnson
  target_norm_eps: 1.0e-8
  drop_features:
    global: [A113_A, D203, D205]
  degenerate_robust_cv: 0.01
  heads:
    global: {output_dim: 278, use_gene_pool: true}
    per_gene: {output_dim: 1}
    per_metabolite: {output_dim: 1}
  head_weights: {gene_interaction: 1.0, per_gene: 1.0, global: 1.0, per_metabolite: 1.0}
  head_phenotypes:
    gene_interaction: [fitness, gene_interaction]
    per_gene: [expression_log2_ratio]
    global: [calmorph]
    per_metabolite: [metabolite]

model:
  checkpoint_path: null
  gene_num: 6607
  hidden_channels: 32
  num_transformer_layers: 2
  num_attention_heads: 4
  dropout: 0.1
  learnable_embedding:
    enabled: true
    size: ${model.hidden_channels}
    preprocessor: {num_layers: 2, dropout: 0.1}
  graph_regularization:
    graph_reg_lambda: 0.001
    graph_reg_layer: [1, 2]
    row_sampling_rate: 1.0
    regularized_heads:
      physical:
        layer: ${model.graph_regularization.graph_reg_layer}
        head: 0
        lambda: ${model.graph_regularization.graph_reg_lambda}
      regulatory:
        layer: ${model.graph_regularization.graph_reg_layer}
        head: 1
        lambda: ${model.graph_regularization.graph_reg_lambda}
  perturbation_head: {num_heads: 4, dropout: 0.1}

regression_task:
  optimizer: {type: AdamW, lr: 3e-4, weight_decay: 1e-8}
  lr_scheduler: null
  clip_grad_norm: true
  clip_grad_norm_max_norm: 10.0
