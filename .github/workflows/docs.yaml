name: Build and Deploy Docs

on:
  push:
    branches:
      - main  # Change this to your default branch if different
  pull_request:
    branches:
      - main  # Change this to your default branch if different

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # CPU-only torch + prebuilt torch-scatter wheel (no GPU on the runner, no
          # source build) so torchcell and its model modules import for autodoc.
          pip install "torch==2.11.0" --index-url https://download.pytorch.org/whl/cpu
          pip install torch-scatter -f https://data.pyg.org/whl/torch-2.11.0+cpu.html
          pip install -r docs/requirements.txt
          # Install the LOCAL torchcell (this checkout) so autodoc documents THIS repo,
          # not the ancient PyPI 0.2.6 release.
          pip install -e .

      - name: Build the documentation
        run: |
          sphinx-build -b html docs/source build/docs

      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build/docs

  readthedocs:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Trigger Read the Docs Build
        env:
          RTD_PROJECT: ${{ secrets.RTD_PROJECT }} # Replace with your Read the Docs project name
          RTD_TOKEN: ${{ secrets.RTD_TOKEN }}     # Set this secret in your GitHub repository settings
        run: |
          curl -X POST -H "Authorization: token $RTD_TOKEN" https://readthedocs.org/api/v2/webhook/torchcell/272672/


          