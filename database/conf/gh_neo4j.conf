#*****************************************************************
# Neo4j configuration -- GilaHyper build/serve container, neo4j 5.26 Enterprise
#
# Migrated from the previous 4.4 config with neo4j's own
# `neo4j-admin server migrate-configuration`, then validated
# (`neo4j-admin server validate-config` -> "No issues found") and boot-tested.
#
# Namespace change in 5.x: `dbms.*` split into
#   server.*  -- server-scoped (connectors, directories, memory, JVM)
#   db.*      -- per-database (tx state, query logs)
# The 4.4 names still resolve as deprecated aliases, but an UNRECOGNIZED name is a
# hard boot failure, so only 5.x names are used here.
#
# Dropped deliberately on migration:
#   causal_clustering.*        -- advertised a long-dead container id; standalone
#                                 deployment does not need them
#   dbms.windows_service_name  -- Linux deployment
#   -XX:-UseBiasedLocking      -- removed in JDK 17
#   a duplicate default_listen_address
#*****************************************************************

# This setting constrains all `LOAD CSV` import files to be under the `import` directory.
server.directories.import=import
server.directories.logs=/logs

server.default_listen_address=0.0.0.0

server.bolt.enabled=true
server.bolt.listen_address=0.0.0.0:7687
server.bolt.advertised_address=gilahyper.zapto.org:7687

server.http.enabled=true
server.http.listen_address=0.0.0.0:7474
server.http.advertised_address=gilahyper.zapto.org:7474

server.threads.worker_count=10
server.memory.pagecache.size=512M
server.metrics.csv.rotation.compression=zip

db.tx_state.memory_allocation=ON_HEAP
db.logs.query.enabled=VERBOSE
db.logs.query.threshold=0

server.jvm.additional=-XX:+UseG1GC
server.jvm.additional=-XX:-OmitStackTraceInFastThrow
server.jvm.additional=-XX:+AlwaysPreTouch
server.jvm.additional=-XX:+UnlockExperimentalVMOptions
server.jvm.additional=-XX:+TrustFinalNonStaticFields
server.jvm.additional=-XX:+DisableExplicitGC
server.jvm.additional=-XX:MaxInlineLevel=15
server.jvm.additional=-Djdk.nio.maxCachedBufferSize=262144
server.jvm.additional=-Dio.netty.tryReflectionSetAccessible=true
server.jvm.additional=-Djdk.tls.ephemeralDHKeySize=2048
server.jvm.additional=-Djdk.tls.rejectClientInitiatedRenegotiation=true
server.jvm.additional=-XX:FlightRecorderOptions=stackdepth=256
server.jvm.additional=-XX:+UnlockDiagnosticVMOptions
server.jvm.additional=-XX:+DebugNonSafepoints
server.jvm.additional=-Dlog4j2.disable.jmx=true

# Added by the 5.x migrator (flagged RECOMMENDED) -- JPMS opens the newer JVM requires.
server.jvm.additional=--add-opens=java.base/java.nio=ALL-UNNAMED
server.jvm.additional=--add-opens=java.base/java.io=ALL-UNNAMED
server.jvm.additional=--add-opens=java.base/sun.nio.ch=ALL-UNNAMED
server.jvm.additional=--enable-native-access=ALL-UNNAMED
