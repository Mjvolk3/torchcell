# torchcell/knowledge_graphs/conf/kg_no_costanzo_doubles.yaml
# [[torchcell.knowledge_graphs.conf.kg_no_costanzo_doubles.yaml]]
# https://github.com/Mjvolk3/torchcell/tree/main/torchcell/knowledge_graphs/conf/kg_no_costanzo_doubles.yaml
#
# Training build: every dataset FULL except the two Costanzo double-mutant sets, which
# are prefiltered to just the records that join to Sameith double-knockout expression.
#
#   python -m torchcell.knowledge_graphs.create_scerevisiae_kg_small \
#       --config-name kg_no_costanzo_doubles
#
# WHY. The Costanzo doubles are 20.7M records each and dominate build time: measured on
# job 970 the whole build is 8.63 h with them capped at 100k, ~98.5 h (4.1 days) with
# them uncapped, and ~8.2 h without them -- they are the ONLY reason a cap exists, since
# every other dataset already builds in full. But dropping them outright loses the 57
# double-mutant fitness records that join 1:1 to Sameith 2015's 72 double-knockout
# expression profiles, the only strains where both readouts exist. A random cap does not
# recover them: at 0.48% it hit 0 of the 72 pairs (measured). So name them instead.

defaults:
  - default
  - _self_ # append to end for overriding duplicate configs in default

wandb:
  mode: online # disabled, offline, online
  project: tcdb

adapters:
  io_to_total_worker_ratio: 0.1
  chunk_size: 4e5
  loader_batch_size: 1e3

subset:
  size: null # take the whole eligible pool of every dataset
  seed: 42
  per_dataset: {} # no random caps needed -- the prefilter does the narrowing
  prefilter:
    # Keep only the Costanzo double-mutant records whose gene pair matches a Sameith
    # double-knockout strain, so fitness and interaction score join to its expression.
    DmfCostanzo2016Dataset:
      gene_sets_file: knowledge_graphs/conf/gene_sets/sameith_double_pairs.txt
    DmiCostanzo2016Dataset:
      gene_sets_file: knowledge_graphs/conf/gene_sets/sameith_double_pairs.txt
