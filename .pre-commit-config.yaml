# .pre-commit-config.yaml
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.20
    hooks:
      # Linter (replaces flake8 + isort + pyupgrade); auto-fixes staged files.
      - id: ruff-check
        args: [--fix]
        files: ^(torchcell|tests/torchcell)/
      # Formatter (replaces black).
      - id: ruff-format
        files: ^(torchcell|tests/torchcell)/

  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: v0.16.0
    hooks:
      - id: markdownlint-cli2
        args: [--fix]
        files: ^notes/.*\.md$

  - repo: local
    hooks:
      # Strict mypy in the torchcell conda env via scripts/run-mypy.sh (resolves the
      # env's mypy by $HOME-relative path, so it works whether or not the env is
      # PATH-activated, and matches the /mypy skill + CI interpreter -> no drift).
      # The wrapper passes --follow-imports=silent so reported errors are scoped to
      # the staged files (fix what you touch), not the deferred 7,666-error backlog.
      - id: mypy
        name: mypy (torchcell, strict)
        entry: bash scripts/run-mypy.sh
        language: system
        types_or: [python, pyi]
        files: ^(torchcell|tests)/
        require_serial: true

      # Schema-dependency gate: when a schema-surface file changes, report which dataset
      # loaders the change forces to rebuild (closure + contract-fingerprint scoped) and
      # block on a breaking change unless TORCHCELL_SCHEMA_ACK=1. Fires only on the surface
      # files so it never runs on ordinary commits. See torchcell/provenance/schema_impact.py.
      - id: schema-impact
        name: schema impact (dataset rebuild gate)
        entry: bash scripts/run-schema-impact.sh
        language: system
        pass_filenames: false
        files: ^torchcell/datamodels/(schema|pydant)\.py$
        require_serial: true
