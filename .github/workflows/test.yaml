name: Pytest with Coverage

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.head.label || github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  pytest-coverage:
    runs-on: ubuntu-latest
    # Blocking (#16): the CI-fragile tests are hardened -- test_s288c has a module-level
    # DATA_ROOT skip, the wall-clock benchmark is gpu-marked (deselected), the PyG-batch
    # test is DATA_ROOT-guarded, and test_cleanup_lock_files is filelock-version-robust --
    # and the torch/torch-scatter install is CPU-only + prebuilt-wheel (no source build).
    # `pytest tests/torchcell -m "not gpu"` gates PRs. See
    # notes/plan.pytest-ci-blocking.2026.07.01.md.

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.13"

    # Cache the dependencies
    - name: Cache pip dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('env/requirements.txt', 'env/requirements_dependent.txt', 'env/requirements_test.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install base dependencies
      run: |
        python -m pip install --upgrade pip
        # CPU-only torch on the runner (no GPU): avoids ~2GB of unused CUDA libraries
        # and CUDA-init noise, and matches the prebuilt +cpu torch-scatter wheel below.
        pip install "torch==2.11.0" --index-url https://download.pytorch.org/whl/cpu
        pip install -r env/requirements.txt

    - name: Install base-dependent dependencies (torch-scatter, prebuilt CPU wheel)
      run: |
        # Prebuilt CPU torch-scatter wheel matched to the CPU torch above -- no source
        # compile, no --no-build-isolation (which turned red under torch 2.11 on CPU CI).
        pip install -r env/requirements_dependent.txt -f https://data.pyg.org/whl/torch-2.11.0+cpu.html

    - name: Install test dependencies
      run: |
        pip install -r env/requirements_test.txt

    - name: Install torchcell package
      run: |
        pip install -e .

    # Blocking (WS4): the WS3 test backlog is cleared. GPU tests are deselected
    # (no CUDA on the runner); the DATA_ROOT / /scratch-dependent files self-skip
    # via in-test guards when their data is absent, so they no longer need --ignore.
    - name: Run pytest with coverage (blocking)
      run: |
        coverage run -m pytest tests/torchcell -m "not gpu"
        coverage report
        coverage xml

    - name: Upload coverage reports to Codecov
      uses: codecov/codecov-action@v4
      # Keep coverage upload best-effort now that the job blocks -- a Codecov outage or
      # missing token must not fail the (now-required) pytest gate.
      continue-on-error: true
      env:
        CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
